<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="700" height="450">

  <rect x="0" y="0" width="700" height="450" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="20" y="26" font-size="14" font-weight="bold" fill="#1a1a2e" font-family="Arial">OptimaliseRing DB - FloodOpt datamodel mapping</text>
  <text x="20" y="44" font-size="10" fill="#6c757d" font-family="Arial">optimalise_ring_2011.sqlite  |  103 dijkringen  |  176 trajecten  |  3348 klimaatrecords</text>

  <!-- Left panel: MDB -->
  <rect x="20" y="58" width="270" height="340" rx="6" fill="white" stroke="#dee2e6" stroke-width="1.5"/>
  <rect x="20" y="58" width="270" height="26" rx="6" fill="#495057"/>
  <text x="30" y="76" font-size="12" font-weight="bold" fill="white" font-family="Arial">OptimaliseRing MDB</text>

  <rect x="30" y="92" width="250" height="20" rx="2" fill="#f1f3f5"/>
  <text x="38" y="106" font-size="10" font-weight="bold" fill="#212529" font-family="Arial">Dijkringen</text>
  <text x="240" y="106" font-size="9" fill="#6c757d" font-family="Arial">103 rijen</text>
  <text x="38" y="118" font-size="9" fill="#495057" font-family="Arial">Id, Naam, Terugkeertijd</text>

  <rect x="30" y="122" width="250" height="20" rx="2" fill="#f1f3f5"/>
  <text x="38" y="136" font-size="10" font-weight="bold" fill="#212529" font-family="Arial">DijkringTrajecten</text>
  <text x="232" y="136" font-size="9" fill="#6c757d" font-family="Arial">176 rijen</text>
  <text x="38" y="148" font-size="9" fill="#495057" font-family="Arial">H0 [cm+NAP], Factor</text>

  <rect x="30" y="152" width="250" height="20" rx="2" fill="#fff3cd"/>
  <text x="38" y="166" font-size="10" font-weight="bold" fill="#856404" font-family="Arial">Klimaat_...DataTraject</text>
  <text x="216" y="166" font-size="9" fill="#6c757d" font-family="Arial">3348 rijen</text>
  <text x="38" y="178" font-size="9" fill="#495057" font-family="Arial">Alpha [1/cm], P0 [1/j], Eta [cm/j]</text>

  <rect x="30" y="182" width="250" height="20" rx="2" fill="#f1f3f5"/>
  <text x="38" y="196" font-size="10" font-weight="bold" fill="#212529" font-family="Arial">ParametersKostenfunctieData</text>
  <text x="218" y="196" font-size="9" fill="#6c757d" font-family="Arial">183 rijen</text>
  <text x="38" y="208" font-size="9" fill="#495057" font-family="Arial">Lambda [1/cm], C_exp, b_exp, Omega</text>

  <rect x="30" y="212" width="250" height="20" rx="2" fill="#f1f3f5"/>
  <text x="38" y="226" font-size="10" font-weight="bold" fill="#212529" font-family="Arial">SchadeFunctieData</text>
  <text x="232" y="226" font-size="9" fill="#6c757d" font-family="Arial">372 rijen</text>
  <text x="38" y="238" font-size="9" fill="#495057" font-family="Arial">Nu, Zeta, Psi</text>

  <rect x="30" y="242" width="250" height="20" rx="2" fill="#f1f3f5"/>
  <text x="38" y="256" font-size="10" font-weight="bold" fill="#212529" font-family="Arial">EconomischScenarioData</text>
  <text x="222" y="256" font-size="9" fill="#6c757d" font-family="Arial">868 rijen</text>
  <text x="38" y="268" font-size="9" fill="#495057" font-family="Arial">Gamma (economische groei)</text>

  <rect x="30" y="272" width="250" height="20" rx="2" fill="#f1f3f5"/>
  <text x="38" y="286" font-size="10" font-weight="bold" fill="#212529" font-family="Arial">RamingVoorSlachtoffersData</text>
  <text x="216" y="286" font-size="9" fill="#6c757d" font-family="Arial">372 rijen</text>
  <text x="38" y="298" font-size="9" fill="#495057" font-family="Arial">Slachtoffers, Getroffenen</text>

  <!-- Conversion box -->
  <rect x="20" y="316" width="270" height="72" rx="4" fill="#e8f4fd" stroke="#90c8f0" stroke-width="1"/>
  <text x="38" y="332" font-size="10" font-weight="bold" fill="#0d6efd" font-family="Arial">Eenheidsconversie (SQLite views)</text>
  <text x="38" y="348" font-size="9" fill="#0a58ca" font-family="Arial">alpha: x100  (1/cm naar 1/m)</text>
  <text x="38" y="362" font-size="9" fill="#0a58ca" font-family="Arial">eta:   /100  (cm/j naar m/j)</text>
  <text x="38" y="376" font-size="9" fill="#0a58ca" font-family="Arial">H0:    /100  (cm+NAP naar m+NAP)</text>

  <!-- Arrow -->
  <line x1="296" y1="218" x2="366" y2="218" stroke="#4361ee" stroke-width="2"/>
  <polygon points="360,212 376,218 360,224" fill="#4361ee"/>
  <text x="302" y="212" font-size="9" fill="#4361ee" font-family="Arial">SQLite</text>
  <text x="302" y="226" font-size="9" fill="#4361ee" font-family="Arial">views</text>

  <!-- Right panel: FloodOpt -->
  <rect x="386" y="58" width="294" height="340" rx="6" fill="white" stroke="#dee2e6" stroke-width="1.5"/>
  <rect x="386" y="58" width="294" height="26" rx="6" fill="#4361ee"/>
  <text x="396" y="76" font-size="12" font-weight="bold" fill="white" font-family="Arial">FloodOpt datamodel [m]</text>

  <!-- Trajectory -->
  <rect x="396" y="92" width="274" height="102" rx="4" fill="#e8f0fe" stroke="#4361ee" stroke-width="1"/>
  <text x="406" y="108" font-size="10" font-weight="bold" fill="#3730a3" font-family="Arial">Trajectory</text>
  <text x="406" y="124" font-size="9" fill="#1e3a5f" font-family="Arial">norm   = 1 / Terugkeertijd</text>
  <text x="406" y="138" font-size="9" fill="#1e3a5f" font-family="Arial">p0     = P0_overstromingskans</text>
  <text x="406" y="152" font-size="9" fill="#1e3a5f" font-family="Arial">alpha  = Alpha x 100  [1/m]</text>
  <text x="406" y="166" font-size="9" fill="#1e3a5f" font-family="Arial">base_year, length, id</text>
  <text x="406" y="183" font-size="9" fill="#6c757d" font-family="Arial">v_trajecten_floodopt (3168 rijen)</text>

  <!-- Scenario -->
  <rect x="396" y="204" width="274" height="80" rx="4" fill="#f3e8ff" stroke="#7209b7" stroke-width="1"/>
  <text x="406" y="220" font-size="10" font-weight="bold" fill="#5b21b6" font-family="Arial">Scenario</text>
  <text x="406" y="236" font-size="9" fill="#2d1b69" font-family="Arial">climate = Klimaat naam</text>
  <text x="406" y="250" font-size="9" fill="#2d1b69" font-family="Arial">eta     = Eta / 100  [m/j]</text>
  <text x="406" y="275" font-size="9" fill="#6c757d" font-family="Arial">18 klimaatscenarios beschikbaar</text>

  <!-- Measure + RiskParams -->
  <rect x="396" y="294" width="274" height="94" rx="4" fill="#d1fae5" stroke="#06d6a0" stroke-width="1"/>
  <text x="406" y="310" font-size="10" font-weight="bold" fill="#064e3b" font-family="Arial">Measure + RiskParams</text>
  <text x="406" y="326" font-size="9" fill="#065f46" font-family="Arial">effect [m] = kruinhoogteverhoging</text>
  <text x="406" y="340" font-size="9" fill="#065f46" font-family="Arial">cost [E]  via ParametersKostenfunctie</text>
  <text x="406" y="354" font-size="9" fill="#065f46" font-family="Arial">gamma     via EconomischScenarioData</text>
  <text x="406" y="368" font-size="9" fill="#065f46" font-family="Arial">base_dmg  via SchadeFunctieData</text>
  <text x="406" y="380" font-size="9" fill="#6c757d" font-family="Arial">Beschikbaar voor stap 1.3 validatie</text>

  <!-- Footer -->
  <rect x="20" y="410" width="660" height="30" rx="4" fill="#fff3cd" stroke="#ffc107" stroke-width="1"/>
  <text x="30" y="423" font-size="10" fill="#856404" font-family="Arial">Gebruik stap 1.3: BruteForce + Pyomo uitvoeren met echte dijkringparameters</text>
  <text x="30" y="436" font-size="10" fill="#856404" font-family="Arial">en vergelijken met OptimaliseRing referentie-uitkomsten (103 dijkringen)</text>

</svg>
