<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="580" height="580">

  <rect x="0" y="0" width="580" height="580" fill="#f8f9fa" rx="8"/>

  <text x="290" y="28" text-anchor="middle" font-size="16" font-weight="bold"
        fill="#1a1a2e" font-family="Arial">FloodOpt - Architectuur</text>

  <!-- Frontend -->
  <rect x="20" y="44" width="540" height="64" rx="8"
        fill="#0077b6" stroke="#023e8a" stroke-width="2"/>
  <text x="290" y="68" text-anchor="middle" font-size="13" font-weight="bold"
        fill="white" font-family="Arial">Frontend  React + Vite + Leaflet</text>
  <text x="290" y="86" text-anchor="middle" font-size="10" fill="#cce8ff"
        font-family="Arial">Kaartviewer (GeoJSON) | Scenario-editor | Resultaten-dashboard</text>
  <text x="550" y="68" text-anchor="end" font-size="9" fill="white"
        font-family="Arial" font-style="italic">Stap 4 (gepland)</text>

  <!-- Connector -->
  <line x1="290" y1="108" x2="290" y2="122" stroke="#adb5bd" stroke-width="2"/>
  <polygon points="283,122 297,122 290,130" fill="#adb5bd"/>
  <text x="302" y="118" font-size="9" fill="#6c757d" font-family="Arial">HTTP / GeoJSON</text>

  <!-- FastAPI -->
  <rect x="20" y="130" width="540" height="64" rx="8"
        fill="#f4a261" stroke="#c76b00" stroke-width="2"/>
  <text x="290" y="154" text-anchor="middle" font-size="13" font-weight="bold"
        fill="#1a1a2e" font-family="Arial">FastAPI  (geen business logic)</text>
  <text x="150" y="172" text-anchor="middle" font-size="9" fill="#333"
        font-family="Arial">POST /optimize  POST /scenarios  POST /trajectories</text>
  <text x="430" y="172" text-anchor="middle" font-size="9" fill="#333"
        font-family="Arial">GET /results/{id}  GET /trajectories/{id}/geojson</text>
  <text x="550" y="154" text-anchor="end" font-size="9" fill="#1a1a2e"
        font-family="Arial" font-style="italic">Stap 2.x (klaar)</text>

  <!-- Two side-by-side: Database + Geo -->
  <line x1="155" y1="194" x2="120" y2="212" stroke="#adb5bd" stroke-width="1.8"/>
  <polygon points="113,209 128,216 120,212" fill="#adb5bd"/>
  <text x="80" y="207" font-size="9" fill="#6c757d" font-family="Arial">SQLAlchemy</text>

  <line x1="425" y1="194" x2="460" y2="212" stroke="#adb5bd" stroke-width="1.8"/>
  <polygon points="453,209 468,216 460,212" fill="#adb5bd"/>
  <text x="434" y="207" font-size="9" fill="#6c757d" font-family="Arial">GeoPandas</text>

  <!-- Database box -->
  <rect x="20" y="212" width="250" height="68" rx="6"
        fill="#f1f3f5" stroke="#adb5bd" stroke-width="1.5"/>
  <text x="145" y="234" text-anchor="middle" font-size="11" font-weight="bold"
        fill="#1a1a2e" font-family="Arial">Database</text>
  <text x="145" y="252" text-anchor="middle" font-size="9" fill="#333"
        font-family="Arial">SQLite (standaard, ingebouwd)</text>
  <text x="145" y="268" text-anchor="middle" font-size="8" fill="#6c757d"
        font-family="Arial">PostgreSQL optioneel via DATABASE_URL</text>
  <text x="260" y="234" text-anchor="end" font-size="9" fill="#adb5bd"
        font-family="Arial" font-style="italic">Stap 2.2 (klaar)</text>

  <!-- Geo box -->
  <rect x="310" y="212" width="250" height="68" rx="6"
        fill="#e8f4fd" stroke="#0077b6" stroke-width="1.5"/>
  <text x="435" y="234" text-anchor="middle" font-size="11" font-weight="bold"
        fill="#023e8a" font-family="Arial">Geo-verwerking</text>
  <text x="435" y="252" text-anchor="middle" font-size="9" fill="#0077b6"
        font-family="Arial">GeoPandas: WKT -&gt; GeoJSON</text>
  <text x="435" y="268" text-anchor="middle" font-size="8" fill="#6c757d"
        font-family="Arial">Geen PostGIS vereist voor MVP</text>
  <text x="550" y="234" text-anchor="end" font-size="9" fill="#0077b6"
        font-family="Arial" font-style="italic">Stap 4.2 (gepland)</text>

  <!-- Connector to core -->
  <line x1="290" y1="280" x2="290" y2="298" stroke="#adb5bd" stroke-width="2"/>
  <polygon points="283,298 297,298 290,306" fill="#adb5bd"/>
  <text x="302" y="293" font-size="9" fill="#6c757d" font-family="Arial">roept aan</text>

  <!-- floodopt-core label -->
  <text x="20" y="323" font-size="10" fill="#6c757d" font-family="Arial"
        font-style="italic">floodopt-core  (strikte laagscheiding: optimizer bevat nooit fysica)</text>

  <!-- Optimization Layer -->
  <rect x="20" y="328" width="540" height="64" rx="8"
        fill="#4361ee" stroke="#3a0ca3" stroke-width="2"/>
  <text x="290" y="352" text-anchor="middle" font-size="13" font-weight="bold"
        fill="white" font-family="Arial">Optimization Layer</text>
  <text x="290" y="370" text-anchor="middle" font-size="9" fill="#c8d8ff"
        font-family="Arial">min sum(ci*xi)  s.t.  sum(hi*xi) >= h_min  |  BruteForce + Pyomo/HiGHS</text>
  <text x="550" y="352" text-anchor="end" font-size="9" fill="white"
        font-family="Arial" font-style="italic">Stap 1.3 (klaar)</text>

  <!-- Connector -->
  <line x1="290" y1="392" x2="290" y2="406" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
  <polygon points="284,406 296,406 290,413" fill="#fff" opacity="0.5"/>

  <!-- Risk Layer -->
  <rect x="20" y="413" width="540" height="64" rx="8"
        fill="#7209b7" stroke="#560bad" stroke-width="2"/>
  <text x="290" y="437" text-anchor="middle" font-size="13" font-weight="bold"
        fill="white" font-family="Arial">Risk Layer</text>
  <text x="290" y="455" text-anchor="middle" font-size="9" fill="#e0b3ff"
        font-family="Arial">NCW = sum( P(s)*V0*exp((g-d)*s) )  |  SimpleRiskCalculator</text>
  <text x="550" y="437" text-anchor="end" font-size="9" fill="white"
        font-family="Arial" font-style="italic">Stap 1.2 (klaar)</text>

  <!-- Connector -->
  <line x1="290" y1="477" x2="290" y2="491" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
  <polygon points="284,491 296,491 290,498" fill="#fff" opacity="0.5"/>

  <!-- Physics Layer -->
  <rect x="20" y="498" width="540" height="64" rx="8"
        fill="#06d6a0" stroke="#05b484" stroke-width="2"/>
  <text x="290" y="522" text-anchor="middle" font-size="13" font-weight="bold"
        fill="#003d2e" font-family="Arial">Physics Layer</text>
  <text x="290" y="540" text-anchor="middle" font-size="9" fill="#004d3a"
        font-family="Arial">P(t) = P0 * exp(a*n*t) * exp(-a*Dh)  |  SimpleDikeOverflow</text>
  <text x="550" y="522" text-anchor="end" font-size="9" fill="#003d2e"
        font-family="Arial" font-style="italic">Stap 1.1 (klaar)</text>

</svg>
