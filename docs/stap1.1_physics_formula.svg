<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="660" height="450">

  <rect x="0" y="0" width="660" height="450" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="20" y="26" font-size="14" font-weight="bold" fill="#1a1a2e" font-family="Arial">Stap 1.1 - SimpleDikeOverflow: P(t) = P0 * exp(a*n*t) * exp(-a*Dh)</text>
  <text x="20" y="44" font-size="10" fill="#6c757d" font-family="Arial">P0=1e-3, alpha=5.0 [1/m], eta=0.003 [m/j], base_year=2017</text>

  <!-- Graph background -->
  <rect x="70" y="58" width="480" height="240" fill="white" stroke="#dee2e6" stroke-width="1" rx="2"/>

  <!-- Grid horizontal: y=298 (P=0), y=238 (P=1e-3), y=178 (P=2e-3), y=118 (P=3e-3), y=58 (P=4e-3) -->
  <line x1="70" y1="238" x2="550" y2="238" stroke="#e9ecef" stroke-width="1"/>
  <line x1="70" y1="178" x2="550" y2="178" stroke="#e9ecef" stroke-width="1"/>
  <line x1="70" y1="118" x2="550" y2="118" stroke="#e9ecef" stroke-width="1"/>

  <!-- Grid vertical: x=70 (t=0), x=190 (t=25), x=310 (t=50), x=430 (t=75), x=550 (t=100) -->
  <line x1="190" y1="58" x2="190" y2="298" stroke="#e9ecef" stroke-width="1"/>
  <line x1="310" y1="58" x2="310" y2="298" stroke="#e9ecef" stroke-width="1"/>
  <line x1="430" y1="58" x2="430" y2="298" stroke="#e9ecef" stroke-width="1"/>

  <!-- Axes -->
  <line x1="70" y1="298" x2="550" y2="298" stroke="#333333" stroke-width="2"/>
  <line x1="70" y1="58"  x2="70"  y2="298" stroke="#333333" stroke-width="2"/>

  <!-- X tick marks and labels -->
  <line x1="70"  y1="298" x2="70"  y2="305" stroke="#333333" stroke-width="1"/>
  <line x1="190" y1="298" x2="190" y2="305" stroke="#333333" stroke-width="1"/>
  <line x1="310" y1="298" x2="310" y2="305" stroke="#333333" stroke-width="1"/>
  <line x1="430" y1="298" x2="430" y2="305" stroke="#333333" stroke-width="1"/>
  <line x1="550" y1="298" x2="550" y2="305" stroke="#333333" stroke-width="1"/>
  <text x="65"  y="318" font-size="10" fill="#6c757d" font-family="Arial">0</text>
  <text x="183" y="318" font-size="10" fill="#6c757d" font-family="Arial">25</text>
  <text x="303" y="318" font-size="10" fill="#6c757d" font-family="Arial">50</text>
  <text x="423" y="318" font-size="10" fill="#6c757d" font-family="Arial">75</text>
  <text x="542" y="318" font-size="10" fill="#6c757d" font-family="Arial">100</text>
  <text x="250" y="336" font-size="11" fill="#495057" font-family="Arial">t [jaar na basisjaar 2017]</text>

  <!-- Y tick marks and labels -->
  <line x1="63" y1="298" x2="70" y2="298" stroke="#333333" stroke-width="1"/>
  <line x1="63" y1="238" x2="70" y2="238" stroke="#333333" stroke-width="1"/>
  <line x1="63" y1="178" x2="70" y2="178" stroke="#333333" stroke-width="1"/>
  <line x1="63" y1="118" x2="70" y2="118" stroke="#333333" stroke-width="1"/>
  <text x="20" y="302" font-size="9" fill="#6c757d" font-family="Arial">0</text>
  <text x="12" y="242" font-size="9" fill="#6c757d" font-family="Arial">1e-3</text>
  <text x="12" y="182" font-size="9" fill="#6c757d" font-family="Arial">2e-3</text>
  <text x="12" y="122" font-size="9" fill="#6c757d" font-family="Arial">3e-3</text>
  <text x="12" y="62"  font-size="9" fill="#6c757d" font-family="Arial">4e-3</text>
  <text x="8" y="200" font-size="10" fill="#495057" font-family="Arial">P(t)</text>

  <!--
    x = 70 + (t/100)*480     y = 298 - (P/4e-3)*240
    Curve 1 no measures: P(t) = 1e-3 * exp(5*0.003*t) = 1e-3 * exp(0.015*t)
      t=0:  P=1.000e-3  y=298-60=238   x=70
      t=25: P=1.454e-3  y=298-87=211   x=190
      t=50: P=2.117e-3  y=298-127=171  x=310
      t=75: P=3.080e-3  y=298-185=113  x=430
      t=100:P=4.482e-3  y=298-269=29   x=550

    Curve 2 Dh=0.5m: P0*exp(-2.5)*exp(0.015t) = 8.21e-5 * exp(0.015t)
      t=0:  P=8.21e-5   y=298-4.9=293   x=70
      t=100:P=3.68e-4   y=298-22=276    x=550

    Curve 3 Dh=1.0m: P0*exp(-5)*exp(0.015t) = 6.74e-6 * exp(0.015t)
      near zero, y~298
  -->

  <!-- Shading under curve 1 -->
  <polygon points="70,298 70,238 190,211 310,171 430,113 550,29 550,298" fill="#e63946" opacity="0.08"/>

  <!-- Curve 1: geen maatregelen (rood) -->
  <polyline points="70,238 190,211 310,171 430,113 550,29" fill="none" stroke="#e63946" stroke-width="2.5"/>

  <!-- Curve 2: Dh=0.5m (oranje) -->
  <polyline points="70,293 190,291 310,289 430,286 550,276" fill="none" stroke="#f4a261" stroke-width="2.5"/>

  <!-- Curve 3: Dh=1.0m (groen, near zero) -->
  <line x1="70" y1="298" x2="550" y2="297" stroke="#06d6a0" stroke-width="2.5"/>

  <!-- P0 dot + label -->
  <circle cx="70" cy="238" r="5" fill="#e63946"/>
  <text x="78" y="234" font-size="10" fill="#e63946" font-family="Arial">P0 = 1e-3  (Case 1)</text>

  <!-- Case 2 dot -->
  <circle cx="310" cy="171" r="4" fill="#e63946"/>
  <text x="316" y="167" font-size="9" fill="#e63946" font-family="Arial">Case 2: 2.12e-3</text>

  <!-- Case 3 label -->
  <text x="74" y="294" font-size="9" fill="#059669" font-family="Arial">Case 3: 6.7e-6 (Dh=1m)</text>

  <!-- Legend box -->
  <rect x="72" y="63" width="196" height="62" rx="4" fill="white" stroke="#dee2e6" stroke-width="1"/>
  <line x1="82" y1="79" x2="107" y2="79" stroke="#e63946" stroke-width="2.5"/>
  <text x="113" y="83" font-size="10" fill="#333333" font-family="Arial">Geen maatregelen (Dh=0)</text>
  <line x1="82" y1="96" x2="107" y2="96" stroke="#f4a261" stroke-width="2.5"/>
  <text x="113" y="100" font-size="10" fill="#333333" font-family="Arial">Dh = 0.5 m</text>
  <line x1="82" y1="113" x2="107" y2="113" stroke="#06d6a0" stroke-width="2.5"/>
  <text x="113" y="117" font-size="10" fill="#333333" font-family="Arial">Dh = 1.0 m</text>

  <!-- Formula box -->
  <rect x="70" y="352" width="520" height="88" rx="6" fill="white" stroke="#dee2e6" stroke-width="1"/>
  <text x="90" y="372" font-size="11" font-weight="bold" fill="#212529" font-family="Arial">Formule (identiek aan OptimaliseRing 2.3.2, HKV 2013):</text>
  <text x="90" y="390" font-size="11" fill="#4361ee" font-family="Arial">P(t) = P0 * exp(alpha * eta * t) * exp(-alpha * Dh)</text>
  <text x="90" y="408" font-size="10" fill="#495057" font-family="Arial">Case 1: P(2017, Dh=0)=1.000e-3  |  Case 2: P(2067, Dh=0)=2.117e-3  |  Case 3: P(2017, Dh=1.0m)=6.738e-6</text>
  <text x="90" y="430" font-size="9" fill="#6c757d" font-family="Arial">7/7 tests geslaagd, mypy schoon, rel_tol=1e-9</text>

</svg>
